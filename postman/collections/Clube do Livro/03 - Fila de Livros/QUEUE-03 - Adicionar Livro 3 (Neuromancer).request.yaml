$kind: http-request
name: 'QUEUE-03 - Adicionar Livro 3 (Neuromancer)'
method: POST
url: '{{baseUrl}}/book-clubs/{{clubId}}/queue'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "googleBooksId": "9GbwhgEACAAJ"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("queueEntry3Id", json.id);
        console.log("queueEntry3Id salvo:", json.id);
      }
      pm.test("Livro 3 adicionado à fila (200)", () => pm.response.to.have.status(200));
      pm.test("Resposta tem id", () => pm.expect(json.id).to.be.a("string"));
