$kind: http-request
name: 'QUEUE-01 - Adicionar Livro 1 (Duna)'
method: POST
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "googleBooksId": "ydQiEAAAQBAJ",
      "deadline": "2026-05-31"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("b1Id", json.id);
        console.log("b1Id salvo:", json.id);
      }
      pm.test("Livro 1 adicionado à fila (201)", () => pm.response.to.have.status(201));
      pm.test("Resposta tem id", () => pm.expect(json.id).to.be.a("string"));
