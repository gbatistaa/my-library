$kind: http-request
name: 'QUEUE-04 - Listar Fila do Clube'
method: GET
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Fila tem 3 livros", () => pm.expect(pm.response.json().length).to.eql(3));
