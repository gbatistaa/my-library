$kind: http-request
name: AUTH-08 - Login Ana
method: POST
url: "{{baseUrl}}/auth/login"
order: 8000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "ana_cruz",
      "password": "Senha@123"
    }
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      const token = json.token || json.accessToken || json.access_token;
      if (token) {
        pm.environment.set("anaToken", token);
        console.log("anaToken salvo.");
      }
      pm.test("Login Ana (200)", () => pm.response.to.have.status(200));
      pm.test("Token recebido", () => pm.expect(token).to.be.a("string"));
    language: text/javascript
