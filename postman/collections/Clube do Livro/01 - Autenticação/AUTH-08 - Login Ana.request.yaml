$kind: http-request
name: AUTH-08 - Login Ana
method: POST
url: "{{baseUrl}}/api/auth/login"
order: 8000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "ana_cruz",
      "password": "Senha@123",
      "deviceId": "device-ana-001",
      "deviceName": "{{deviceName}}"
    }
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      const token = json.token || json.accessToken || json.access_token;
      if (token) {
        pm.environment.set("anaToken", token);
        console.log("anaToken salvo.");
        pm.sendRequest({
          url: pm.environment.get("baseUrl") + "/api/auth/me",
          method: "GET",
          header: { "Authorization": "Bearer " + token }
        }, (err, res) => {
          if (!err && res.json().id) {
            pm.environment.set("anaId", res.json().id);
            console.log("anaId salvo:", res.json().id);
          }
        });
      }
      pm.test("Login Ana (200)", () => pm.response.to.have.status(200));
      pm.test("Token recebido", () => pm.expect(token).to.be.a("string"));
    language: text/javascript
