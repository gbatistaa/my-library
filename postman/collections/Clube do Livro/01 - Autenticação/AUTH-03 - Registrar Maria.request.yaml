$kind: http-request
name: AUTH-03 - Registrar Maria
method: POST
url: "{{baseUrl}}/api/auth/register"
order: 3000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "maria_oli",
      "email": "maria@mylibrary.com",
      "password": "Senha@123",
      "name": "Maria Oliveira",
      "birthDate": "1995-08-20",
      "deviceId": "device-maria-001",
      "deviceName": "{{deviceName}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Maria registrada (200 ou 201)", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
