$kind: http-request
name: AUTH-01 - Registrar Gabriel (Admin)
method: POST
url: "{{baseUrl}}/api/auth/register"
order: 1000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "gabriel_admin",
      "email": "gabriel@mylibrary.com",
      "password": "Senha@123",
      "name": "Gabriel Batista",
      "birthDate": "1990-01-01",
      "deviceId": "device-gabriel-001",
      "deviceName": "{{deviceName}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Gabriel registrado (200 ou 201)", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
