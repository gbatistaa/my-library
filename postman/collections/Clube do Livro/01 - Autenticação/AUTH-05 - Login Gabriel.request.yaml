$kind: http-request
name: 'AUTH-05 - Login Gabriel'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "gabriel_admin",
      "password": "Senha@123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      const token = json.token || json.accessToken || json.access_token;
      if (token) {
        pm.environment.set("adminToken", token);
        console.log("adminToken salvo.");
      }
      pm.test("Login Gabriel (200)", () => pm.response.to.have.status(200));
      pm.test("Token recebido", () => pm.expect(token).to.be.a("string"));
