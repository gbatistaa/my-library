$kind: http-request
name: AUTH-04 - Registrar Ana
method: POST
url: "{{baseUrl}}/auth/register"
order: 4000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "ana_cruz",
      "email": "ana@mylibrary.com",
      "password": "Senha@123",
      "name": "Ana Cruz"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Ana registrada (200 ou 201)", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
    language: text/javascript
