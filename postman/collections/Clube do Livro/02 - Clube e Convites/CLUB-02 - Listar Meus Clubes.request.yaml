$kind: http-request
name: 'CLUB-02 - Listar Meus Clubes'
method: GET
url: '{{baseUrl}}/book-clubs'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
