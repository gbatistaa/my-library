$kind: http-request
name: 'INVITE-01 - Convidar Joao'
method: POST
url: '{{baseUrl}}/api/club-invites'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "bookClubId": "{{clubId}}",
      "inviteeId": "{{joaoId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("inv1Id", json.id);
        console.log("inv1Id salvo:", json.id);
      }
      pm.test("Convite criado (200)", () => pm.response.to.have.status(200));
