$kind: http-request
name: 'INVITE-06 - Ana Aceita Convite'
method: POST
url: '{{baseUrl}}/api/club-invites/{{inv3Id}}/accept'
order: 9000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{anaToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Ana aceitou convite (200)", () => pm.response.to.have.status(200));
