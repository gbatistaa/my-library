$kind: http-request
name: 'MEMBERS-01 - Listar Membros do Clube'
method: GET
url: '{{baseUrl}}/members/club/{{clubId}}'
order: 10000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Clube tem 4 membros", () => pm.expect(pm.response.json().totalElements).to.eql(4));
