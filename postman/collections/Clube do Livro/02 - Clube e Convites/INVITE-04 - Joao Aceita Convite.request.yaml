$kind: http-request
name: 'INVITE-04 - Joao Aceita Convite'
method: PATCH
url: '{{baseUrl}}/api/club-invites/{{inv1Id}}/accept'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{joaoToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: pm.test("Joao aceitou convite (200)", () => pm.response.to.have.status(200));
