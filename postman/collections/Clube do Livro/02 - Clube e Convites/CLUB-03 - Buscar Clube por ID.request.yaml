$kind: http-request
name: 'CLUB-03 - Buscar Clube por ID'
method: GET
url: '{{baseUrl}}/api/book-clubs/{{clubId}}'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("ID correto", () => pm.expect(pm.response.json().id).to.eql(pm.environment.get("clubId")));
