$kind: http-request
name: 'CYCLE-03 - Encerrar Ciclo'
method: GET
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/progress'
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Todos os membros registraram progresso", () => pm.expect(pm.response.json().length).to.eql(4));
