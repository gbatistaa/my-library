$kind: http-request
name: 'PROGRESS-04 - Ana Registra Progresso'
method: POST
url: '{{baseUrl}}/reading-cycles/{{cycleId}}/progress'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{anaToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "currentPage": 300,
      "totalPages": 412,
      "notes": "A linguagem é densa mas vale cada página."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Progresso registrado (200)", () => pm.response.to.have.status(200));
