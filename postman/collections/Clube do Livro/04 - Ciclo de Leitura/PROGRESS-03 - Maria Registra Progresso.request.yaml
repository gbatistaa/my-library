$kind: http-request
name: 'PROGRESS-03 - Maria Registra Progresso'
method: PATCH
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/progress/me'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{mariaToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "currentPage": 412
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Progresso registrado (200)", () => pm.response.to.have.status(200));
