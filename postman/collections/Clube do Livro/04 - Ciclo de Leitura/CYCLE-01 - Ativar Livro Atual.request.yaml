$kind: http-request
name: CYCLE-01 - Ativar Livro Atual
method: POST
url: "{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/current"
body:
  type: json
  content: ""
order: 1000
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: |-
      const json = pm.response.json();
      pm.test("Livro ativado (200)", () => pm.response.to.have.status(200));
      pm.test("isCurrent é true", () => pm.expect(json.isCurrent).to.be.true);
    language: text/javascript
