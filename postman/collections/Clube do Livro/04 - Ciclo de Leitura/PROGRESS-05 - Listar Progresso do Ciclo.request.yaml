$kind: http-request
name: 'PROGRESS-05 - Listar Progresso do Ciclo'
method: GET
url: '{{baseUrl}}/reading-cycles/{{cycleId}}/progress'
order: 7000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Há registros de progresso", () => pm.expect(pm.response.json().length).to.be.above(0));
