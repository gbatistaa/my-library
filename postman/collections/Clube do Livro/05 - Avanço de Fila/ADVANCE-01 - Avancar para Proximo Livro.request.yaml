$kind: http-request
name: 'ADVANCE-01 - Avancar para Proximo Livro'
method: POST
url: '{{baseUrl}}/book-clubs/{{clubId}}/queue/advance'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("cycle2Id", json.id);
        console.log("cycle2Id salvo:", json.id);
      }
      pm.test("Fila avançada (200)", () => pm.response.to.have.status(200));
      pm.test("Novo ciclo tem id", () => pm.expect(json.id).to.be.a("string"));
