$kind: http-request
name: 'REVIEW-06 - Buscar Review por ID'
method: GET
url: '{{baseUrl}}/api/reviews/{{review1Id}}'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("ID correto", () => pm.expect(pm.response.json().id).to.eql(pm.environment.get("review1Id")));
