$kind: http-request
name: 'REVIEW-06 - Buscar Review por ID'
method: GET
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/reviews'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Review de Gabriel está na lista", () => {
        const found = json.some(r => r.id === pm.environment.get("review1Id"));
        pm.expect(found).to.be.true;
      });
