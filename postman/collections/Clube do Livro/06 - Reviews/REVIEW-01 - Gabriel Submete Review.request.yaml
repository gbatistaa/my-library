$kind: http-request
name: 'REVIEW-01 - Gabriel Submete Review'
method: POST
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/reviews'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rating": 5,
      "reviewText": "Duna é uma obra-prima da ficção científica. A construção do universo é incomparável, com política, religião e ecologia entrelaçados de forma magistral."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("review1Id", json.id);
        console.log("review1Id salvo:", json.id);
      }
      pm.test("Review criado (201)", () => pm.response.to.have.status(201));
      pm.test("Review tem id", () => pm.expect(json.id).to.be.a("string"));
      pm.test("Rating correto", () => pm.expect(json.rating).to.eql(5));
