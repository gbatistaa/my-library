$kind: http-request
name: 'REVIEW-04 - Ana Submete Review'
method: POST
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/reviews'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{anaToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rating": 4,
      "reviewText": "Muito bom! A ecologia de Arrakis é um personagem por si só."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("review4Id", json.id);
        console.log("review4Id salvo:", json.id);
      }
      pm.test("Review criado (201)", () => pm.response.to.have.status(201));
      pm.test("Rating correto", () => pm.expect(json.rating).to.eql(4));
