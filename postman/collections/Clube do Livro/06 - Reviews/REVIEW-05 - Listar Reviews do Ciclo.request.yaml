$kind: http-request
name: 'REVIEW-05 - Listar Reviews do Ciclo'
method: GET
url: '{{baseUrl}}/api/book-clubs/{{clubId}}/books/{{b1Id}}/reviews'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Há reviews", () => pm.expect(json.length).to.be.above(0));
      pm.test("Há 4 reviews", () => pm.expect(json.length).to.eql(4));
