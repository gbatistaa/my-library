$kind: http-request
name: 'REVIEW-03 - Maria Submete Review'
method: POST
url: '{{baseUrl}}/reading-cycles/{{cycleId}}/reviews'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{mariaToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rating": 5,
      "comment": "Simplesmente perfeito. A jornada de Paul Atreides é inesquecível."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.id) {
        pm.environment.set("review3Id", json.id);
        console.log("review3Id salvo:", json.id);
      }
      pm.test("Review criado (200)", () => pm.response.to.have.status(200));
      pm.test("Rating correto", () => pm.expect(json.rating).to.eql(5));
