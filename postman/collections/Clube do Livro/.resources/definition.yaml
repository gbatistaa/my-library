description: |-
  # Clube do Livro — Coleção de Testes E2E

  Coleção completa para testar o módulo **Book Club** do projeto **MyLibrary**.

  ## Fluxo de Execução

  Execute as pastas **em ordem** para garantir que as variáveis de ambiente sejam populadas corretamente:

  1. **01 - Autenticação** — Registra 4 usuários e faz login, salvando os tokens.
  2. **02 - Clube e Convites** — Cria o clube, envia convites e os membros aceitam.
  3. **03 - Fila de Livros** — Adiciona 3 livros à fila via Google Books ID.
  4. **04 - Ciclo de Leitura** — Ativa o primeiro livro, registra progresso dos 4 membros e encerra o ciclo.
  5. **05 - Avanço de Fila** — Avança para o próximo livro da fila.
  6. **06 - Reviews** — Os 4 membros submetem reviews do livro lido.

  ## Variáveis de Ambiente Utilizadas

  | Variável | Descrição |
  |---|---|
  | `baseUrl` | URL base da API (ex: `http://localhost:8080`) |
  | `adminToken` | JWT do usuário Gabriel (admin do clube) |
  | `joaoToken` | JWT do usuário João Silva |
  | `mariaToken` | JWT da usuária Maria Oliveira |
  | `anaToken` | JWT da usuária Ana Cruz |
  | `clubId` | ID do clube criado |
  | `inv1Id` | ID do convite para João |
  | `inv2Id` | ID do convite para Maria |
  | `inv3Id` | ID do convite para Ana |
  | `queueEntry1Id` | ID da entrada na fila — Duna |
  | `queueEntry2Id` | ID da entrada na fila — Fundação |
  | `queueEntry3Id` | ID da entrada na fila — Neuromancer |
  | `cycleId` | ID do ciclo de leitura ativo |
  | `cycle2Id` | ID do segundo ciclo (após avanço de fila) |
  | `review1Id` | ID do review do Gabriel |
  | `review2Id` | ID do review do João |
  | `review3Id` | ID do review da Maria |
  | `review4Id` | ID do review da Ana |
