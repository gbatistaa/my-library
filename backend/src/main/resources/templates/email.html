<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${subject}"></title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #020617; color: #f8fafc;">
    <div class="container" style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
        <div class="header" style="text-align: center; margin-bottom: 32px;">
            <a href="#" class="logo" style="font-size: 24px; font-weight: 800; color: #8b5cf6; text-decoration: none; letter-spacing: -0.025em;">My Library</a>
        </div>
        <div class="card" style="background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
            <div class="sender-info" style="display: inline-block; background-color: #1e293b; padding: 4px 12px; border-radius: 9999px; color: #94a3b8; margin-bottom: 16px; font-size: 14px;">
                De: <span th:text="${sender}"></span>
            </div>
            <div class="sender-info" style="display: inline-block; background-color: #1e293b; padding: 4px 12px; border-radius: 9999px; color: #94a3b8; margin-bottom: 16px; font-size: 14px;">
                Para: <span th:text="${to}"></span>
            </div>
            <h1 style="font-size: 22px; font-weight: 700; margin: 0 0 16px 0; color: #ffffff;" th:text="${subject}">Assunto do Email</h1>
            <div class="content" style="line-height: 1.6; font-size: 16px;">
                <p style="margin: 0 0 24px 0; color: #cbd5e1;">Olá, <strong style="color: #ffffff;" th:text="${userName}">Usuário</strong>!</p>
                <p style="margin: 0 0 24px 0; color: #cbd5e1;">Este é um email enviado automaticamente pelo sistema My Library.</p>
                <!-- O conteúdo real pode vir aqui futuramente -->
            </div>
            <div class="footer" style="margin-top: 32px; padding-top: 32px; border-top: 1px solid #1e293b; font-size: 14px; color: #64748b; text-align: center;">
                &copy; 2024 My Library. Todos os direitos reservados.
            </div>
        </div>
    </div>
</body>
</html>
